{% set name = "py-heat" %}
{% set version = "0.0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/py-heat-{{ version }}.tar.gz
  sha256: bcb63622a82120212ff4e20e8a02ad9359c249951c540cc11db7114bb2a86d76

build:
  entry_points:
    - pyheat=pyheat.commandline:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 1

requirements:
  host:
    - pip
    - python {{ python_min }}
  run:
    - matplotlib-base
    - pprofile
    - python >={{ python_min }}

test:
  imports:
    - pyheat
  commands:
    - pip check
    - pyheat --help
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/csurfer/pyheat
  summary: Python program profiled as a heatmap
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
